<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" href="/favicon.ico">
  <title>%VITE_APP_TITLE%</title>
  <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->

  <script src="/EasyPlayer/EasyPlayer-pro.js"></script>

  <script type="text/javascript" src="http://api.tianditu.gov.cn/api?v=4.0&tk=45bcf1e117a1e74f6b0815dc881ced18"></script>

  <!-- 提前读取主题配置 -->
  <script>
    (function () {
      try {
        var setting = JSON.parse(localStorage.getItem('layout-setting') || '{}');
        var theme = setting.theme || '#409EFF';
        var sideTheme = setting.sideTheme || 'theme-light';
        var isDark = sideTheme === 'theme-dark';

        document.documentElement.style.setProperty('--theme-color', theme);
        document.documentElement.style.setProperty('--theme-color-light', theme + '4D');
        document.documentElement.style.setProperty('--theme-color-lighter', theme + '26');

        if (isDark) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) { }
    })();
  </script>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body,
    #app {
      height: 100%;
      margin: 0px;
      padding: 0px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    :root {
      --theme-color: #409EFF;
      --theme-color-light: rgba(64, 158, 255, 0.3);
      --theme-color-lighter: rgba(64, 158, 255, 0.15);
      --loader-bg: #ffffff;
      --loader-text: #303133;
      --loader-text-secondary: #909399;
    }

    html.dark {
      --loader-bg: #141414;
      --loader-text: #ffffff;
      --loader-text-secondary: #8c8c8c;
    }

    .chromeframe {
      margin: 0.2em 0;
      background: #ccc;
      color: #000;
      padding: 0.2em 0;
    }

    #loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999999;
    }

    #loader-wrapper .loader-section {
      position: fixed;
      top: 0;
      width: 51%;
      height: 100%;
      background: var(--loader-bg);
      z-index: 1000;
      transform: translateX(0);
    }

    #loader-wrapper .loader-section.section-left {
      left: 0;
    }

    #loader-wrapper .loader-section.section-right {
      right: 0;
    }

    #loader {
      display: block;
      position: relative;
      left: 50%;
      top: 50%;
      width: 150px;
      height: 150px;
      margin: -75px 0 0 -75px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--theme-color);
      animation: spin 2s linear infinite;
      z-index: 1001;
    }

    #loader::before {
      content: "";
      position: absolute;
      top: 5px;
      left: 5px;
      right: 5px;
      bottom: 5px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--theme-color-light);
      animation: spin 3s linear infinite;
    }

    #loader::after {
      content: "";
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--theme-color-lighter);
      animation: spin 1.5s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    #loader-wrapper .system-title {
      position: absolute;
      top: 36%;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 1001;
      color: var(--loader-text);
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    #loader-wrapper .load_title {
      color: var(--loader-text-secondary);
      font-size: 14px;
      width: 100%;
      text-align: center;
      z-index: 1001;
      position: absolute;
      top: 62%;
      line-height: 24px;
      letter-spacing: 1px;
    }

    #loader-wrapper .load_title span {
      display: block;
      font-size: 12px;
      color: var(--loader-text-secondary);
      opacity: 0.6;
      margin-top: 4px;
    }

    .loaded #loader-wrapper .loader-section.section-left {
      transform: translateX(-100%);
      transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    }

    .loaded #loader-wrapper .loader-section.section-right {
      transform: translateX(100%);
      transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    }

    .loaded #loader {
      opacity: 0;
      transition: all 0.3s ease-out;
    }

    .loaded .system-title,
    .loaded .load_title {
      opacity: 0;
      transition: all 0.3s ease-out;
    }

    .loaded #loader-wrapper {
      visibility: hidden;
      transform: translateY(-100%);
      transition: all 0.3s 1s ease-out;
    }

    .no-js #loader-wrapper {
      display: none;
    }

    .no-js h1 {
      color: #222222;
    }

    @media (max-width: 480px) {
      #loader-wrapper .system-title {
        font-size: 20px;
      }

      #loader-wrapper .load_title {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="loader-wrapper">
      <div id="loader"></div>
      <div class="loader-section section-left"></div>
      <div class="loader-section section-right"></div>
      <div class="system-title">%VITE_APP_TITLE%</div>
      <div class="load_title">
        正在加载系统资源
        <span>请耐心等待，初次加载可能需要一些时间</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
